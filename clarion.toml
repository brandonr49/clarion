[server]
host = "0.0.0.0"
port = 8080
data_dir = "./data"

[providers.ollama]
base_url = "http://localhost:11434"

[providers.claude]
api_key_env = "ANTHROPIC_API_KEY"
api_key_file = "ANTHROPIC_API_KEY"

[providers.openai]
api_key_env = "OPENAI_API_KEY"

[routing]
tier1 = "ollama:qwen3:8b"
tier2 = "ollama:qwen3:8b"
tier3 = "claude:claude-sonnet-4-20250514"
# Available Claude models (as of April 2026):
# claude-haiku-4-5-20251001 (cheapest, fastest)
# claude-sonnet-4-20250514 (good balance)
# claude-opus-4-20250514 (strongest reasoning)

[worker]
poll_interval = 1.0
max_retries = 3
clarification_timeout_hours = 24

[harness]
max_iterations = 20
tool_timeout = 30
max_note_size = 102400

[maintenance]
brain_review_hours = 0     # run brain structure review every 24 hours (0 = disabled)
pattern_detection_hours = 0  # run pattern detection weekly (0 = disabled)
embedding_rebuild_hours = 0    # rebuild embeddings on change only (0 = disabled)
