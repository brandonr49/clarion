<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clarion</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f0f0f; color: #e0e0e0;
    max-width: 800px; margin: 0 auto; padding: 20px;
  }
  h1 { font-size: 1.5rem; margin-bottom: 4px; color: #fff; }
  h1 span { color: #666; font-weight: normal; font-size: 0.8rem; }
  h2 { font-size: 1.1rem; margin: 24px 0 12px; color: #aaa; border-bottom: 1px solid #222; padding-bottom: 4px; }

  /* Note input */
  .input-area { margin: 16px 0; }
  .input-area textarea {
    width: 100%; padding: 10px; border: 1px solid #333; border-radius: 6px;
    background: #1a1a1a; color: #e0e0e0; font-size: 0.95rem;
    resize: vertical; min-height: 60px; font-family: inherit;
  }
  .input-area textarea:focus { outline: none; border-color: #555; }
  .input-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .input-row select {
    padding: 6px 10px; border: 1px solid #333; border-radius: 4px;
    background: #1a1a1a; color: #e0e0e0; font-size: 0.85rem;
  }
  button {
    padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer;
    font-size: 0.85rem; font-weight: 500;
  }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:disabled { background: #333; cursor: not-allowed; }
  .btn-secondary { background: #333; color: #ccc; }
  .btn-secondary:hover { background: #444; }

  /* Status badge */
  .status {
    display: inline-block; padding: 2px 8px; border-radius: 3px;
    font-size: 0.75rem; font-weight: 500;
  }
  .status-queued { background: #333; color: #888; }
  .status-processing { background: #1e3a5f; color: #60a5fa; }
  .status-processed { background: #14532d; color: #4ade80; }
  .status-failed { background: #450a0a; color: #f87171; }
  .status-awaiting_clarification { background: #422006; color: #fbbf24; }

  /* Note list */
  .note-item {
    padding: 10px; margin: 6px 0; border: 1px solid #222; border-radius: 6px;
    background: #141414;
  }
  .note-meta { font-size: 0.75rem; color: #666; margin-top: 4px; }
  .note-content { font-size: 0.9rem; white-space: pre-wrap; }

  /* Query area */
  .query-area { margin: 16px 0; }
  .query-area input {
    width: 100%; padding: 10px; border: 1px solid #333; border-radius: 6px;
    background: #1a1a1a; color: #e0e0e0; font-size: 0.95rem; font-family: inherit;
  }
  .query-area input:focus { outline: none; border-color: #555; }
  .query-response {
    margin-top: 12px; padding: 12px; border: 1px solid #222; border-radius: 6px;
    background: #141414; white-space: pre-wrap; font-size: 0.9rem;
    display: none;
  }
  .query-response.visible { display: block; }

  /* Clarifications */
  .clar-item {
    padding: 10px; margin: 6px 0; border: 1px solid #422006; border-radius: 6px;
    background: #1a1508;
  }
  .clar-question { font-size: 0.9rem; color: #fbbf24; margin-bottom: 8px; }
  .clar-reply { display: flex; gap: 8px; }
  .clar-reply input {
    flex: 1; padding: 6px 10px; border: 1px solid #333; border-radius: 4px;
    background: #1a1a1a; color: #e0e0e0; font-size: 0.85rem; font-family: inherit;
  }

  .loading { color: #666; font-style: italic; }
  .empty { color: #444; font-style: italic; padding: 10px; }
</style>
</head>
<body>

<h1>Clarion <span>v0.1.0</span></h1>

<h2>New Note</h2>
<div class="input-area">
  <textarea id="noteInput" placeholder="Type a note, thought, or instruction..." rows="3"></textarea>
  <div class="input-row">
    <select id="inputMethod">
      <option value="typed">Typed</option>
      <option value="priming">Priming</option>
    </select>
    <button class="btn-primary" onclick="submitNote()" id="submitBtn">Submit</button>
  </div>
</div>

<h2>Ask a Question</h2>
<div class="query-area">
  <input id="queryInput" placeholder="Ask the brain something..." onkeydown="if(event.key==='Enter')submitQuery()">
  <div class="input-row" style="margin-top:8px">
    <button class="btn-primary" onclick="submitQuery()" id="queryBtn">Ask</button>
  </div>
  <div id="queryResponse" class="query-response"></div>
</div>

<div id="clarSection" style="display:none">
  <h2>Pending Questions</h2>
  <div id="clarList"></div>
</div>

<h2>Recent Notes</h2>
<div id="noteList"><span class="loading">Loading...</span></div>

<script>
const API = '/api/v1';

async function submitNote() {
  const input = document.getElementById('noteInput');
  const method = document.getElementById('inputMethod').value;
  const btn = document.getElementById('submitBtn');
  const content = input.value.trim();
  if (!content) return;

  btn.disabled = true;
  try {
    const resp = await fetch(`${API}/notes`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        content: content,
        source_client: 'web',
        input_method: method,
      }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      alert(`Error: ${err.detail || JSON.stringify(err)}`);
      return;
    }
    input.value = '';
    loadNotes();
  } finally {
    btn.disabled = false;
  }
}

async function submitQuery() {
  const input = document.getElementById('queryInput');
  const btn = document.getElementById('queryBtn');
  const responseDiv = document.getElementById('queryResponse');
  const query = input.value.trim();
  if (!query) return;

  btn.disabled = true;
  responseDiv.textContent = 'Thinking...';
  responseDiv.classList.add('visible');

  try {
    const resp = await fetch(`${API}/query`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ query: query, source_client: 'web' }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      responseDiv.textContent = `Error: ${err.detail || JSON.stringify(err)}`;
      return;
    }
    const data = await resp.json();
    responseDiv.textContent = data.raw_text || '(No response)';
  } catch (e) {
    responseDiv.textContent = `Error: ${e.message}`;
  } finally {
    btn.disabled = false;
  }
}

async function loadNotes() {
  try {
    const resp = await fetch(`${API}/notes?limit=20`);
    const data = await resp.json();
    const list = document.getElementById('noteList');

    if (data.notes.length === 0) {
      list.innerHTML = '<div class="empty">No notes yet. Submit one above.</div>';
      return;
    }

    list.innerHTML = data.notes.map(n => `
      <div class="note-item">
        <div class="note-content">${escHtml(n.content)}</div>
        <div class="note-meta">
          <span class="status status-${n.status}">${n.status}</span>
          ${n.source_client} &middot; ${n.input_method} &middot;
          ${new Date(n.created_at).toLocaleString()}
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('noteList').innerHTML =
      `<div class="empty">Failed to load notes: ${e.message}</div>`;
  }
}

async function loadClarifications() {
  try {
    const resp = await fetch(`${API}/clarifications`);
    const data = await resp.json();
    const section = document.getElementById('clarSection');
    const list = document.getElementById('clarList');

    if (data.clarifications.length === 0) {
      section.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    list.innerHTML = data.clarifications.map(c => `
      <div class="clar-item">
        <div class="clar-question">${escHtml(c.question)}</div>
        <div class="clar-reply">
          <input id="clar-${c.id}" placeholder="Your answer...">
          <button class="btn-secondary" onclick="replyClarification('${c.id}')">Reply</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    // Silent fail for clarifications
  }
}

async function replyClarification(clarId) {
  const input = document.getElementById(`clar-${clarId}`);
  const content = input.value.trim();
  if (!content) return;

  await fetch(`${API}/notes`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      content: content,
      source_client: 'web',
      input_method: 'typed',
      metadata: { clarification_id: clarId },
    }),
  });

  loadClarifications();
  loadNotes();
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Keyboard shortcut: Ctrl/Cmd+Enter to submit note
document.getElementById('noteInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    submitNote();
  }
});

// Initial load + polling
loadNotes();
loadClarifications();
setInterval(loadNotes, 5000);
setInterval(loadClarifications, 10000);
</script>
</body>
</html>
